# ─────────────────────────────────────────────────────────────
# /etc/nginx/sites-available/notedeck.derhachov.dev
#
# Install (run as root):
#   cp /home/deploy/notedeck/deploy/notedeck.nginx.conf /etc/nginx/sites-available/notedeck.derhachov.dev
#   ln -s /etc/nginx/sites-available/notedeck.derhachov.dev \
#          /etc/nginx/sites-enabled/notedeck.derhachov.dev
#   nginx -t && systemctl reload nginx
#
# SSL (run AFTER enabling the site and starting the containers):
#   certbot --nginx -d notedeck.derhachov.dev
# ─────────────────────────────────────────────────────────────

# ── Rate-limit zones (defined in http context via /etc/nginx/nginx.conf include,
#    but nginx allows them here too if this file is in sites-available) ──────────

# General: 20 req/s per IP, burst queue of 50
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# API: 10 req/s per IP, stricter for write endpoints
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Auth / login: 5 req/min per IP to slow brute-force (Firebase handles auth,
# but this protects any server-side auth endpoints)
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Limit simultaneous connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Redirect HTTP → HTTPS ───────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name notedeck.derhachov.dev;

    # Allow Let's Encrypt ACME challenges through before redirecting
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ───────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name notedeck.derhachov.dev;

    # ── SSL — managed by Certbot (paths written automatically after certbot run)
    ssl_certificate     /etc/letsencrypt/live/notedeck.derhachov.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notedeck.derhachov.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Timeouts ────────────────────────────────────────────────────────────────
    client_header_timeout 10s;
    client_body_timeout   30s;
    send_timeout          30s;
    keepalive_timeout     65s;

    # ── Body size ────────────────────────────────────────────────────────────────
    # Matches the image upload limit; raised per-route for the upload endpoint
    client_max_body_size 20m;

    # ── Connection limit ────────────────────────────────────────────────────────
    limit_conn conn_limit 30;

    # ── Hide server fingerprint ─────────────────────────────────────────────────
    server_tokens off;

    # ── Security headers ─────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "no-referrer"                         always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # Tight CSP — adjust if you add third-party scripts
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' https://apis.google.com; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: blob: https:; \
         connect-src 'self' https://*.firebaseapp.com https://*.googleapis.com wss://*.firebaseio.com; \
         frame-src https://accounts.google.com; \
         object-src 'none'; \
         base-uri 'self';" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/x-javascript text/xml application/xml
        application/rss+xml image/svg+xml;

    # ── Logging ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/notedeck.access.log;
    error_log  /var/log/nginx/notedeck.error.log warn;

    # ── API routes → frontend container (which internally proxies to backend) ────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Image uploads can be large
        client_max_body_size 20m;
    }

    # ── Swagger UI (restrict to trusted IPs in production if desired) ────────────
    location /api-docs {
        limit_req zone=general burst=5 nodelay;
        # Uncomment to restrict to your IP only:
        # allow 1.2.3.4;
        # deny all;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static assets — long cache, no rate limit needed ─────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|png|jpe?g|gif|webp)$ {
        proxy_pass       http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires          1y;
        add_header       Cache-Control "public, immutable";
        # Re-apply security headers (add_header doesn't inherit into nested blocks)
        add_header       X-Content-Type-Options "nosniff" always;
    }

    # ── Everything else → SPA ─────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
