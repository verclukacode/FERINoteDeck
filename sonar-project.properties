# ── SonarCloud project identity ────────────────────────────────────────────────
# Replace both values with the ones shown in SonarCloud after creating the project:
#   sonarcloud.io → your org → Projects → Create project → (choose GitHub) → properties
sonar.organization=verclukacode
sonar.projectKey=verclukacode_FERINoteDeck
sonar.projectName=FERINoteDeck

# ── Sources (monorepo: BE TypeScript + FE JavaScript/JSX) ──────────────────────
sonar.sources=backend/src,frontend/src

# ── Test file detection ────────────────────────────────────────────────────────
sonar.test.inclusions=**/*.test.ts,**/*.test.js,**/*.test.jsx,**/*.stories.jsx

# ── Exclusions ─────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/storybook-static/**,\
  **/uploads/**,\
  **/*.stories.jsx

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.stories.jsx,\
  frontend/src/**/*.jsx,\
  frontend/src/main.jsx,\
  frontend/src/lib/firebase.js,\
  frontend/src/services/**,\
  frontend/src/hooks/**,\
  backend/src/index.ts,\
  backend/src/middleware/**,\
  backend/src/types/**,\
  backend/src/routes/calendar-events.ts,\
  backend/src/routes/calendar-tags.ts,\
  backend/src/routes/cards.ts,\
  backend/src/routes/deck-invites.ts,\
  backend/src/routes/flashcard-folders.ts,\
  backend/src/routes/folders.ts,\
  backend/src/routes/images.ts,\
  backend/src/routes/invites.ts,\
  backend/src/routes/marketplace.ts,\
  backend/src/lib/cloneDeck.ts,\
  backend/src/lib/firebase.ts,\
  backend/src/lib/openai.ts,\
  backend/src/lib/prisma.ts,\
  backend/src/lib/studySettings.ts

# ── LCOV coverage reports (generated by vitest --coverage in CI) ───────────────
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# ── TypeScript config (backend only) ──────────────────────────────────────────
sonar.typescript.tsconfigPath=backend/tsconfig.json
