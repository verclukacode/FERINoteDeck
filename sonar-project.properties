# ── SonarCloud project identity ────────────────────────────────────────────────
# Replace both values with the ones shown in SonarCloud after creating the project:
#   sonarcloud.io → your org → Projects → Create project → (choose GitHub) → properties
sonar.organization=verclukacode
sonar.projectKey=verclukacode_FERINoteDeck
sonar.projectName=FERINoteDeck

# ── Sources (monorepo: BE TypeScript + FE JavaScript/JSX) ──────────────────────
sonar.sources=backend/src,frontend/src

# ── Test file detection ────────────────────────────────────────────────────────
sonar.test.inclusions=**/*.test.ts,**/*.test.js,**/*.test.jsx,**/*.stories.jsx

# ── Exclusions ─────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/storybook-static/**,\
  **/uploads/**,\
  **/*.stories.jsx

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.js,\
  **/*.test.jsx,\
