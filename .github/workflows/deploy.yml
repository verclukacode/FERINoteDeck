name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Images are published under fdergachev's personal GHCR, not the repo owner
  GHCR_OWNER: fdergachev
  BACKEND_IMAGE: ghcr.io/fdergachev/notedeck-backend
  FRONTEND_IMAGE: ghcr.io/fdergachev/notedeck-frontend

jobs:
  # ──────────────────────────────────────────────
  # Job 1: build Docker images and push to GHCR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_OWNER }}
          # GHCR_PUSH_TOKEN: PAT from fdergachev with write:packages scope
          password: ${{ secrets.GHCR_PUSH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------- backend ----------
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ---------- frontend ----------
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          # Firebase config is baked into the JS bundle at build time
          build-args: |
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ──────────────────────────────────────────────
  # Job 2: deploy to the VM over SSH
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Copy the production compose file to the VM
      - name: Upload docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/deploy/notedeck/

      # Pull latest images and restart services
      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          # PAT with read:packages scope — used to docker login on the VM
          GHCR_TOKEN: ${{ secrets.VM_GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,OPENAI_API_KEY
          script: |
            set -e

            # Authenticate against GHCR so the VM can pull private images
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            cd /home/deploy/notedeck

            # Pull updated images with retries (guards against transient network drops)
            n=0; until [ $n -ge 5 ]; do
              docker compose -f docker-compose.prod.yml pull && break
              n=$((n+1)); echo "Pull failed, retry $n/5 in 15s..."; sleep 15
            done
            if [ $n -ge 5 ]; then echo "Pull failed after 5 retries"; exit 1; fi
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up dangling images to free disk space
            docker image prune -f
